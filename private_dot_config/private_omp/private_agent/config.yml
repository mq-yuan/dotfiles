symbolPreset: nerd
theme:
  dark: mahogany
setupVersion: 1

disabledProviders:
  - claude

retry:
  # Automatically switch to the role's fallback model when Kimi hits
  # 429 (rate limit), overloaded, quota exhaustion, or a provider outage.
  modelFallback: true

  # Once the Kimi cooldown expires, later turns automatically revert
  # to the original (primary) model.
  fallbackRevertPolicy: cooldown-expiry

  fallbackChains:
    # ──────────────────────────────────────────
    # Fallbacks for the K3 primary roles
    # Terra high and Sol medium are roughly equal in quality.
    # Terra is preferred; Sol acts as the second line of defense.
    # ──────────────────────────────────────────
    default:
      - "openai-codex/gpt-5.6-terra:high"
      - "openai-codex/gpt-5.6-sol:medium"

    task:
      - "openai-codex/gpt-5.6-terra:high"
      - "openai-codex/gpt-5.6-sol:medium"

    vision:
      - "openai-codex/gpt-5.6-terra:high"
      - "openai-codex/gpt-5.6-sol:medium"

    designer:
      - "openai-codex/gpt-5.6-terra:high"
      - "openai-codex/gpt-5.6-sol:medium"

    # ──────────────────────────────────────────
    # Fallbacks for lightweight and background roles
    # Terra medium is the lowest quality tier allowed here.
    # ──────────────────────────────────────────
    smol:
      - "openai-codex/gpt-5.6-terra:medium"

    tiny:
      - "openai-codex/gpt-5.6-terra:medium"

    commit:
      - "openai-codex/gpt-5.6-terra:medium"

tools:
  # Prompt only for write operations; the tools listed under `approval`
  # below are pre-approved and never prompt.
  approvalMode: write
  approval:
    bash: allow
    task: allow
    read: allow
    hub: allow

shellPath: /bin/bash
modelRoles:
  # ──────────────────────────────────────────
  # Kimi K3: primary coding roles
  # K3 currently takes no thinking-effort suffix.
  # ──────────────────────────────────────────
  default: "kimi-code/k3"
  task: "kimi-code/k3"
  vision: "kimi-code/k3"
  designer: "kimi-code/k3"

  # ──────────────────────────────────────────
  # Kimi K2.7 Code HighSpeed: lightweight and background roles
  # HighSpeed matches standard K2.7 Code in capability, but outputs
  # about 6x faster while consuming roughly 3x the quota.
  # ──────────────────────────────────────────
  smol: "kimi-code/kimi-for-coding-highspeed:medium"
  tiny: "kimi-code/kimi-for-coding-highspeed:minimal"
  commit: "kimi-code/kimi-for-coding-highspeed:low"

  # ──────────────────────────────────────────
  # GPT-5.6 Sol: planning, focused reasoning, and independent review
  # ──────────────────────────────────────────
  plan: "openai-codex/gpt-5.6-sol:medium"
  slow: "openai-codex/gpt-5.6-sol:xhigh"
  advisor: "openai-codex/gpt-5.6-sol:medium"
