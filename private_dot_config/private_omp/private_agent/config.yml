symbolPreset: nerd
theme:
  dark: mahogany
setupVersion: 1

disabledProviders:
  - claude

retry:
  # Kimi 发生 429、overloaded、quota 或 provider 故障时，
  # 自动切换到对应角色的备用模型。
  modelFallback: true

  # Kimi cooldown 结束后，后续 turn 自动恢复原模型。
  fallbackRevertPolicy: cooldown-expiry

  fallbackChains:
    # ─────────────��───────────────────────────
    # K3 主力角色
    # Terra high 与 Sol medium 质量基本相当。
    # Terra 优先，Sol 作��第二道保障。
    # ────────────��────────────────────────────
    default:
      - "openai-codex/gpt-5.6-terra:high"
      - "openai-codex/gpt-5.6-sol:medium"

    task:
      - "openai-codex/gpt-5.6-terra:high"
      - "openai-codex/gpt-5.6-sol:medium"

    vision:
      - "openai-codex/gpt-5.6-terra:high"
      - "openai-codex/gpt-5.6-sol:medium"

    designer:
      - "openai-codex/gpt-5.6-terra:high"
      - "openai-codex/gpt-5.6-sol:medium"

    # ─────────���───────────────────�───────────
    # 简单与后台任务
    # Terra medium 是允许的最低质量。
    # ─────────────────────────���────────────────
    smol:
      - "openai-codex/gpt-5.6-terra:medium"

    tiny:
      - "openai-codex/gpt-5.6-terra:medium"

    commit:
      - "openai-codex/gpt-5.6-terra:medium"

tools:
  approvalMode: write
  approval:
    bash: allow
    task: allow

shellPath: /bin/bash
modelRoles:
  # ──────────────────────────────────────────
  # Kimi K3：主要编码
  # K3 当前不添加 thinking 后缀。
  # ──────────────────────────────────────────
  default: "kimi-code/k3"
  task: "kimi-code/k3"
  vision: "kimi-code/k3"
  designer: "kimi-code/k3"

  # ──────────────────────────────────────────
  # Kimi K2.7 Code HighSpeed：轻量与后台任务
  # HighSpeed 与标准 K2.7 Code 能力相同，
  # 但输出约快 6 倍，额度消耗约为 3 倍。
  # ──────────────────────────────────────────
  smol: "kimi-code/kimi-for-coding-highspeed:medium"
  tiny: "kimi-code/kimi-for-coding-highspeed:minimal"
  commit: "kimi-code/kimi-for-coding-highspeed:low"

  # ──────────────────────────────────────────
  # GPT-5.6 Sol：规划、重点推理和独立审查
  # ──────────────────────────────────────────
  plan: "openai-codex/gpt-5.6-sol:medium"
  slow: "openai-codex/gpt-5.6-sol:xhigh"
  advisor: "openai-codex/gpt-5.6-sol:medium"
