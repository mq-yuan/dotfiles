# ==============================================================================
# tmux Configuration
# ==============================================================================

# --- General Settings ---

# Use 256-color support and set the default terminal type
set -g default-terminal "tmux-256color"

# Enable mouse support for scrolling, pane switching, and resizing
set -g mouse on

# Increase scrollback buffer size (useful for viewing long training logs)
set -g history-limit 100000

# Start window and pane numbering at 1 instead of 0 for easier keyboard navigation
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed to maintain a gapless sequence
set -g renumber-windows on

# Allow tmux to set the system clipboard using OSC 52 sequences
set -g set-clipboard on

# Allow applications inside tmux to pass through escape sequences to the host terminal
# (Required for features like terminal notifications and image previews)
set -g allow-passthrough on

# Allow tmux reattach for focus tracking 
set -g focus-events on
