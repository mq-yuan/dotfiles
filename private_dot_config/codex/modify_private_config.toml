#!/usr/bin/env -S uv run --quiet --no-project --script
# /// script
# requires-python = ">=3.11"
# dependencies = ["tomlkit"]
# ///
"""Chezmoi modify script: enforce [tui] status_line in Codex CLI config.toml.

Reads the existing config from stdin (chezmoi pipes the current target
file content), sets `tui.status_line` to the desired list, and writes
the updated TOML to stdout. All other sections (project trust paths,
marketplaces, model migrations, etc.) are preserved verbatim by tomlkit.
"""

from __future__ import annotations

import sys

import tomlkit

DESIRED_STATUS_LINE = [
    "model-with-reasoning",
    "current-dir",
    "git-branch",
    "context-used",
    "used-tokens",
    "context-window-size",
]

raw = sys.stdin.read()
doc = tomlkit.parse(raw) if raw.strip() else tomlkit.document()

tui = doc.get("tui")
if tui is None:
    tui = tomlkit.table()
    doc["tui"] = tui
tui["status_line"] = DESIRED_STATUS_LINE

sys.stdout.write(tomlkit.dumps(doc))
